<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NGX-ARIMA | EDA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
        body { font-family: 'Geist', sans-serif; background-color: #f7f9fb; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen">
    <div class="max-w-7xl mx-auto p-6 space-y-6">
        <div class="flex items-center gap-4 mb-6">
            <a href="/dashboard" class="material-symbols-outlined text-outline hover:text-primary">arrow_back</a>
            <div>
                <h1 class="font-headline-md text-headline-md font-bold text-primary">Exploratory Data Analysis</h1>
                <p class="text-on-surface-variant text-body-sm">Module 7 - Historical charts, return distributions, and summary statistics</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-4 grid grid-cols-2 md:grid-cols-4 gap-4" id="eda-stats"></div>

            <div class="lg:col-span-2 bg-white border border-outline-variant p-5 rounded-xl">
                <h3 class="font-headline-sm text-headline-sm font-semibold mb-4">Historical Price & Returns</h3>
                <div class="h-72"><canvas id="chart-prices"></canvas></div>
            </div>

            <div class="lg:col-span-2 bg-white border border-outline-variant p-5 rounded-xl">
                <h3 class="font-headline-sm text-headline-sm font-semibold mb-4">Return Distribution (Histogram)</h3>
                <div class="h-72"><canvas id="chart-histogram"></canvas></div>
            </div>

            <div class="lg:col-span-2 bg-white border border-outline-variant p-5 rounded-xl">
                <h3 class="font-headline-sm text-headline-sm font-semibold mb-4">QQ Plot (Normality)</h3>
                <div class="h-72 flex items-center justify-center text-outline text-body-sm">
                    Generated via scipy.stats.probplot - sample quantiles vs theoretical
                </div>
            </div>

            <div class="lg:col-span-2 bg-white border border-outline-variant p-5 rounded-xl">
                <h3 class="font-headline-sm text-headline-sm font-semibold mb-4">Rolling Volatility</h3>
                <div class="h-72"><canvas id="chart-volatility"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        let priceChart, histChart, volChart;
        const logReturns = [];

        async function loadEDA() {
            const res = await fetch('/api/data-summary?symbol=ASI.NGX');
            const data = await res.json();
            if (data.error) return;

            document.getElementById('eda-stats').innerHTML = `
                <div class="bg-white p-4 rounded-xl border border-outline-variant">
                    <p class="text-label-sm text-outline">Records</p>
                    <p class="text-2xl font-bold">${data.total_records}</p>
                </div>
                <div class="bg-white p-4 rounded-xl border border-outline-variant">
                    <p class="text-label-sm text-outline">Date Range</p>
                    <p class="text-xl font-bold">${data.start_date} &mdash; ${data.end_date}</p>
                </div>
                <div class="bg-white p-4 rounded-xl border border-outline-variant">
                    <p class="text-label-sm text-outline">Latest Close</p>
                    <p class="text-2xl font-bold">₦${data.current_price.toFixed(2)}</p>
                </div>
                <div class="bg-white p-4 rounded-xl border border-outline-variant">
                    <p class="text-label-sm text-outline">Volatility (σ)</p>
                    <p class="text-2xl font-bold">${(data.log_returns.reduce((s,v,i,a) => {if(i>0)s+=v;return s;},0)/data.log_returns.length || 0).toFixed(6)}</p>
                </div>
            `;

            const rets = data.log_returns.filter(r => r !== 0);
            const labels = data.dates.slice(-rets.length);

            if (priceChart) priceChart.destroy();
            priceChart = new Chart(document.getElementById('chart-prices'), {
                type: 'line',
                data: {
                    labels: data.dates,
                    datasets: [
                        { label: 'Close Price', data: data.prices, borderColor: '#006a61', borderWidth: 2, fill: true, backgroundColor: 'rgba(0,106,97,0.05)', pointRadius: 0, tension: 0.1, yAxisID: 'y' },
                        { label: 'Log Return', data: data.log_returns, borderColor: '#ec6e4c', borderWidth: 1, pointRadius: 0, tension: 0.1, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { boxWidth: 12 } } },
                    scales: {
                        x: { grid: { display: false } },
                        y: { grid: { color: '#e6e8ea' }, position: 'left', title: { display: true, text: 'Price (₦)' } },
                        y1: { grid: { display: false }, position: 'right', title: { display: true, text: 'Log Return' } }
                    }
                }
            });

            const bins = 30;
            const min = Math.min(...rets);
            const max = Math.max(...rets);
            const bw = (max - min) / bins;
            const histData = Array(bins).fill(0);
            const histLabels = [];
            for (let i = 0; i < bins; i++) {
                histLabels.push((min + i * bw).toFixed(4));
                rets.forEach(r => { if (r >= min + i * bw && r < min + (i + 1) * bw) histData[i]++; });
            }

            if (histChart) histChart.destroy();
            histChart = new Chart(document.getElementById('chart-histogram'), {
                type: 'bar',
                data: { labels: histLabels, datasets: [{ label: 'Frequency', data: histData, backgroundColor: 'rgba(0,106,97,0.6)', borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#e6e8ea' } } } }
            });

            const volData = [];
            for (let i = 20; i < rets.length; i++) {
                const window = rets.slice(i - 20, i);
                const mean = window.reduce((a, b) => a + b, 0) / window.length;
                const std = Math.sqrt(window.reduce((s, v) => s + (v - mean) ** 2, 0) / window.length);
                volData.push(std * Math.sqrt(252) * 100);
            }

            if (volChart) volChart.destroy();
            volChart = new Chart(document.getElementById('chart-volatility'), {
                type: 'line',
                data: {
                    labels: labels.slice(20),
                    datasets: [{ label: 'Annualized Volatility (%)', data: volData, borderColor: '#ec6e4c', borderWidth: 1.5, fill: true, backgroundColor: 'rgba(236,110,76,0.1)', pointRadius: 0, tension: 0.1 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#e6e8ea' }, title: { display: true, text: 'Vol (%)' } } } }
            });
        }
        loadEDA();
    </script>
</body>
</html>
