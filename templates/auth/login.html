<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NGX-ARIMA | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
        body { font-family: 'Geist', sans-serif; background-color: #f7f9fb; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md mx-4">
        <div class="bg-white border border-outline-variant p-8 rounded-xl shadow-sm">
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center mx-auto mb-4">
                    <span class="material-symbols-outlined text-on-primary">analytics</span>
                </div>
                <h1 class="font-headline-md text-headline-md font-bold text-primary">NGX-ARIMA</h1>
                <p class="text-on-surface-variant text-body-sm">Sign in to your account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-4 p-3 rounded-lg text-body-sm font-medium
                            {% if category == 'error' %}bg-error-container text-on-error-container
                            {% elif category == 'success' %}bg-secondary-container/20 text-secondary
                            {% else %}bg-surface-container text-on-surface{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <div>
                    <label class="block text-label-md text-on-surface-variant mb-1.5 font-medium">Username or Email</label>
                    <input type="text" name="username" required
                        class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-2.5 px-3 focus:ring-1 focus:ring-secondary focus:outline-none text-body-md">
                </div>
                <div>
                    <label class="block text-label-md text-on-surface-variant mb-1.5 font-medium">Password</label>
                    <input type="password" name="password" required
                        class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-2.5 px-3 focus:ring-1 focus:ring-secondary focus:outline-none text-body-md">
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="remember" class="accent-secondary rounded">
                        <span class="text-body-sm text-on-surface-variant">Remember me</span>
                    </label>
                    <a href="#" class="text-body-sm text-secondary hover:underline">Forgot password?</a>
                </div>
                <button type="submit" class="w-full py-2.5 bg-primary text-on-primary rounded-lg font-label-md font-bold hover:opacity-90 transition-all">
                    Sign In
                </button>
            </form>

            <p class="text-center mt-6 text-body-sm text-on-surface-variant">
                Don't have an account?
                <a href="{{ url_for('auth.register') }}" class="text-secondary font-medium hover:underline">Register</a>
            </p>
        </div>
        <p class="text-center mt-4 text-label-sm text-outline">
            <a href="/" class="hover:text-secondary">&larr; Back to home</a>
        </p>
    </div>
</body>
</html>
