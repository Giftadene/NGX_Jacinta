<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NGX-ARIMA | Change Password</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
        body { font-family: 'Geist', sans-serif; background-color: #f7f9fb; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md mx-4">
        <div class="bg-white border border-outline-variant p-8 rounded-xl shadow-sm">
            <div class="text-center mb-8">
                <span class="material-symbols-outlined text-4xl text-primary mb-2 inline-block">lock_reset</span>
                <h1 class="font-headline-md text-headline-md font-bold text-primary">Change Password</h1>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-4 p-3 rounded-lg text-body-sm font-medium
                            {% if category == 'error' %}bg-error-container text-on-error-container
                            {% elif category == 'success' %}bg-secondary-container/20 text-secondary
                            {% else %}bg-surface-container text-on-surface{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.change_password') }}" class="space-y-5">
                <div>
                    <label class="block text-label-md text-on-surface-variant mb-1.5 font-medium">Current Password</label>
                    <input type="password" name="current_password" required
                        class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-2.5 px-3 focus:ring-1 focus:ring-secondary focus:outline-none">
                </div>
                <div>
                    <label class="block text-label-md text-on-surface-variant mb-1.5 font-medium">New Password</label>
                    <input type="password" name="new_password" required minlength="6"
                        class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-2.5 px-3 focus:ring-1 focus:ring-secondary focus:outline-none">
                </div>
                <button type="submit" class="w-full py-2.5 bg-secondary text-on-secondary rounded-lg font-label-md font-bold hover:brightness-110 transition-all">
                    Update Password
                </button>
            </form>
            <p class="text-center mt-4">
                <a href="{{ url_for('dashboard.index') }}" class="text-body-sm text-secondary hover:underline">&larr; Back to dashboard</a>
            </p>
        </div>
    </div>
</body>
</html>
